<link rel="manifest" href="manifest-einkauf.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c1b1a; --ink-2:#2a2726; --ink-3:#3a3634;
  --red:#8f1d33; --red-deep:#6b1526; --red-bright:#b02942;
  --gold:#c9a35e; --gold-soft:#e4cf9c;
  --cream:#f6efe2; --cream-dim:#e9ddc6;
  --line:rgba(201,163,94,0.28);
  --ok:#5c8362;
  --shadow:0 12px 32px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(143,29,51,0.25), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(201,163,94,0.12), transparent 55%),
    var(--ink);
  color:var(--cream);
  font-family:'Work Sans',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wordmark{font-family:'Marcellus',serif;letter-spacing:0.04em;}
.app{max-width:820px;margin:0 auto;padding:20px 16px 80px;}

header.top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-radius:16px;
  background:linear-gradient(135deg, var(--ink-2), var(--ink-3));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  margin-bottom:18px;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:44px;height:44px;border-radius:50%;
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;background:var(--ink);
}
.brand-mark img{width:100%;height:100%;object-fit:cover;}
.brand h1{font-size:19px;margin:0;font-weight:600;}
.brand .sub{font-size:11.5px;color:var(--gold-soft);opacity:0.85;letter-spacing:0.07em;text-transform:uppercase;}
.btn{background:var(--red);color:#fff;border:none;padding:9px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;}
.btn:hover{background:var(--red-bright);}
.btn.gold{background:var(--gold);color:var(--ink);}
.btn.gold:hover{background:var(--gold-soft);}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--cream);}
.btn.ghost:hover{border-color:var(--gold);}
.btn.danger{background:transparent;border:1px solid var(--red);color:#e79aa7;}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:7px;}

.panel{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.panel h3{font-family:'Marcellus',serif;font-size:17px;margin:0 0 12px;font-weight:400;color:var(--gold-soft);}

.event-row{
  background:var(--ink-3);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;
  cursor:pointer;margin-bottom:8px;flex-wrap:wrap;
}
.event-row:hover{border-color:var(--gold);}
.event-row .date-chip{background:var(--red);color:#fff;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;white-space:nowrap;}
.event-row .info{flex:1;min-width:160px;}
.event-row .info b{font-size:14px;}
.event-row .info .meta{font-size:11.5px;opacity:0.7;margin-top:2px;}
.event-row .badge{font-size:10.5px;background:var(--ink);border:1px solid var(--gold);color:var(--gold-soft);padding:3px 8px;border-radius:12px;}
.event-row .badge.done{border-color:var(--ok);color:#a8d1b3;}

.empty-state{text-align:center;padding:40px 20px;color:var(--cream);opacity:0.6;font-size:13.5px;}

.dish-ref{font-size:12.5px;background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;gap:8px;}
.dish-ref .qtybit{opacity:0.7;white-space:nowrap;}

.item-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed var(--line);}
.item-row:last-child{border-bottom:none;}
.item-row input[type=checkbox]{width:19px;height:19px;accent-color:var(--gold);flex-shrink:0;}
.item-row.checked .item-name{opacity:0.45;text-decoration:line-through;}
.item-name{flex:1;background:none;border:none;color:var(--cream);font-size:14px;padding:4px 2px;}
.item-name:focus{outline:none;border-bottom:1px solid var(--gold);}
.item-qty{width:70px;background:var(--ink);border:1px solid var(--line);border-radius:7px;color:var(--cream);font-size:12.5px;padding:5px 7px;}
.item-del{background:none;border:none;color:var(--gold-soft);opacity:0.5;font-size:15px;cursor:pointer;padding:2px 6px;}
.item-del:hover{opacity:1;}
.add-item-row{display:flex;gap:8px;margin-top:10px;}
.add-item-row input{flex:1;background:var(--ink);border:1px solid var(--line);border-radius:9px;color:var(--cream);padding:9px 11px;font-size:13.5px;}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{
  background:linear-gradient(135deg, var(--ink-2), var(--ink-3));
  border:1px solid var(--line);border-radius:18px;padding:32px 26px;max-width:380px;width:100%;
  box-shadow:var(--shadow);text-align:center;
}
.login-card .brand-mark{width:56px;height:56px;margin:0 auto 14px;}
.login-card h1{font-family:'Marcellus',serif;font-weight:400;font-size:24px;margin:0 0 4px;}
.login-card .sub{font-size:12px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:22px;}
.field{text-align:left;margin-bottom:14px;}
label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--gold-soft);margin-bottom:5px;opacity:0.9;}
input[type=email],input[type=password]{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--cream);padding:9px 11px;border-radius:9px;font-size:14px;}
.login-card .btn{width:100%;padding:11px;margin-top:6px;}
.login-error{background:rgba(143,29,51,0.25);border:1px solid var(--red);color:#f2c9d1;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:14px;text-align:left;}
.login-hint{font-size:11.5px;opacity:0.55;margin-top:18px;line-height:1.5;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(246,239,226,0.3);border-top-color:var(--cream);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

#printArea{position:fixed;inset:0;background:#fff;z-index:9999;overflow:auto;padding:40px;display:none;}
#printArea.show{display:block;}
.print-toolbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:16px;}
.print-body{color:#1c1b1a;font-family:'Work Sans',sans-serif;max-width:700px;margin:0 auto;}
.print-header{display:flex;align-items:center;gap:14px;border-bottom:3px solid #8f1d33;padding-bottom:12px;margin-bottom:16px;}
.print-header .logo{width:50px;height:50px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.print-header .logo img{width:100%;height:100%;object-fit:cover;}
.print-header h1{font-family:'Marcellus',serif;color:#6b1526;margin:0;font-size:20px;}
.print-header .sub{font-size:11.5px;color:#8f1d33;text-transform:uppercase;letter-spacing:0.06em;}
.print-list-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #e9ddc6;font-size:13px;}
.print-checkbox{width:14px;height:14px;border:1.5px solid #8f1d33;border-radius:3px;flex-shrink:0;}
.print-checkbox.checked{background:#8f1d33;}
.back-link{color:var(--gold-soft);text-decoration:none;font-size:12.5px;display:inline-block;margin-bottom:10px;}
.back-link:hover{color:#fff;}

/* Tab-Leiste */
.tabs2{display:flex;gap:6px;margin:0 0 18px;}
.tabs2 button{background:transparent;border:1px solid var(--line);color:var(--cream);padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:500;}
.tabs2 button.active{background:var(--red);border-color:var(--red-bright);color:#fff;}

/* Rezepturen-Akkordeon */
.cat-block{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.cat-title{background:var(--ink-3);padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px;}
.cat-title .tag{font-size:11px;color:var(--gold-soft);opacity:0.7;font-weight:400;}
.cat-body{padding:12px 14px;display:none;background:var(--ink);}
.cat-body.open{display:block;}
.sub-title{font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--gold-soft);margin:14px 0 8px;opacity:0.85;}
.sub-title:first-child{margin-top:0;}
.add-line-btn{background:var(--ink);border:1px solid var(--gold);color:var(--gold-soft);padding:5px 10px;border-radius:7px;font-size:12px;cursor:pointer;}
.add-line-btn:hover{background:var(--gold);color:var(--ink);}

/* Zutaten-Rechner-Zeile (Faktor / Menge pro Person / Einheit / Personen -> Ergebnis) */
.item-row2{background:var(--ink-3);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;}
.item-row2.checked{opacity:0.5;}
.item-row2-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.item-row2-top input[type=checkbox]{width:19px;height:19px;accent-color:var(--gold);flex-shrink:0;}
.item-name2{flex:1;background:var(--ink);border:1px solid var(--line);border-radius:7px;color:var(--cream);font-size:14px;padding:6px 8px;}
.item-row2.checked .item-name2{text-decoration:line-through;}
.item-row2-fields{display:grid;grid-template-columns:1fr 1fr 0.8fr 0.8fr;gap:6px;}
.item-row2-fields select,.item-row2-fields input{background:var(--ink);border:1px solid var(--line);border-radius:7px;color:var(--cream);font-size:12px;padding:6px 5px;width:100%;}
.item-row2-result{margin-top:8px;font-size:13px;color:var(--gold-soft);text-align:right;}

</style>
</head>

const CATEGORY_LABELS = {event:'Event', wochenmarkt:'Wochenmarkt', thymeandlime:'Thyme & Lime', festivalTL:'Festivals & Wochenmärkte (T&L)'};
const RELEVANT_CATEGORIES = ['event','wochenmarkt','thymeandlime','festivalTL']; // "Sonstiges" hat keine Gerichte -> hier ausgeblendet

const FAKTOR_OPTIONS = [0.75, 1, 1.5, 1.8];
const EINHEIT_OPTIONS = ['mg','g','kg','ml','l','Stück'];
const REZEPT_KATEGORIEN = ['Fleisch','Gemüse','Sonstiges','Vorrat'];
const REZEPT_KATEGORIEN_FUER_EINKAUF = ['Fleisch','Gemüse','Sonstiges']; // "Vorrat" wird NICHT automatisch in die Einkaufsliste übernommen

let state = {
  events: [],
  shoppingLists: {}, // eventId -> {items:[...]}
  recipes: {}, // recipeId -> {name, ingredients:[...]}
  openRecipes: {},
  authUser: null, authError: null, authBusy: false,
  loaded: false,
  view: 'list', // 'list' | 'detail' | 'recipes'
  activeEventId: null,
  settings: {logo:null}
};

function computeErgebnisNum(mengeProPerson, anzahlPersonen, faktor){
  const m = parseFloat(mengeProPerson)||0;
  const p = parseFloat(anzahlPersonen)||0;
  const f = parseFloat(faktor)||1;
  return m*p*f;
}
function formatErgebnis(mengeProPerson, anzahlPersonen, faktor, einheit){
  const total = computeErgebnisNum(mengeProPerson, anzahlPersonen, faktor);
  einheit = einheit || 'g';
  let val = total, unit = einheit;
  if(einheit==='mg' && total>=1000){ val = total/1000; unit='g'; }
  else if(einheit==='g' && total>=1000){ val = total/1000; unit='kg'; }
  else if(einheit==='ml' && total>=1000){ val = total/1000; unit='l'; }
  return val.toLocaleString('de-DE',{maximumFractionDigits:2}) + ' ' + unit;
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayISO(){ const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
function fmtDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
}

/* ============================= FIRESTORE ============================= */
let unsubEvents=null, unsubLists=null, unsubRecipes=null;
function startSync(){
  unsubEvents = onSnapshot(collection(db,'events'), snap=>{
    state.events = snap.docs.map(d=>d.data());
    state.loaded = true;
    render();
  }, err=>{ console.error('Firestore-Fehler (events):', err); handleErr(err); });

  unsubLists = onSnapshot(collection(db,'shoppingLists'), snap=>{
    const lists = {};
    snap.docs.forEach(d=>{ lists[d.id] = d.data(); });
    state.shoppingLists = lists;
    render();
  }, err=>{ console.error('Firestore-Fehler (shoppingLists):', err); });

  unsubRecipes = onSnapshot(collection(db,'recipes'), snap=>{
    const recipes = {};
    snap.docs.forEach(d=>{ recipes[d.id] = {id:d.id, ...d.data()}; });
    state.recipes = recipes;
    render();
  }, err=>{ console.error('Firestore-Fehler (recipes):', err); });

  onSnapshot(doc(db,'settings','main'), d=>{
    state.settings = d.exists() ? d.data() : {logo:null};
    render();
  }, ()=>{});
}
function stopSync(){ if(unsubEvents) unsubEvents(); if(unsubLists) unsubLists(); if(unsubRecipes) unsubRecipes(); }
function handleErr(err){
  if(err && err.code === 'permission-denied' && state.authUser){
    state.authError = 'Dieses Konto ('+state.authUser.email+') ist für Red Lotus nicht freigeschaltet. Bitte bei Felix melden.';
    stopSync();
    signOut(auth);
  }
}
async function saveList(eventId, items){
  try{ await setDoc(doc(db,'shoppingLists',eventId), {items, updatedAt: new Date().toISOString()}); }
  catch(e){ console.error('Fehler beim Speichern der Einkaufsliste:', e); showToast('Speichern fehlgeschlagen: '+(e.message||e), true); }
}
async function saveRecipe(recipeId, data){
  try{ await setDoc(doc(db,'recipes',recipeId), data); }
  catch(e){ console.error('Fehler beim Speichern der Rezeptur:', e); showToast('Speichern fehlgeschlagen: '+(e.message||e), true); }
}
async function deleteRecipe(recipeId){
  try{ await deleteDoc(doc(db,'recipes',recipeId)); }
  catch(e){ console.error('Fehler beim Löschen der Rezeptur:', e); showToast('Löschen fehlgeschlagen: '+(e.message||e), true); }
}
function showToast(text, isError){
  let el = document.getElementById('rlToast');
  if(!el){
    el = document.createElement('div');
    el.id = 'rlToast';
    el.style.cssText = 'position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 18px;border-radius:10px;font-size:13px;max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.4);';
    document.body.appendChild(el);
  }
  el.style.background = isError ? '#8f1d33' : '#3d6b4a';
  el.style.color = '#f6efe2';
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ el.style.display='none'; }, isError?6000:2200);
}

/* ============================= RENDER ============================= */
function render(){
  const app = document.getElementById('app');
  if(!state.authUser){ app.innerHTML = renderLogin(); attachLoginHandlers(); return; }
  if(!state.loaded){ app.innerHTML = '<div class="empty-state">Lade…</div>'; return; }

  let body;
  if(state.view==='detail') body = renderDetail();
  else if(state.view==='recipes') body = renderRecipes();
  else body = renderList();
  app.innerHTML = renderHeader() + body;
  attachHandlers();
}

function renderHeader(){
  const logo = state.settings.logo || DEFAULT_LOGO;
  return `
  <header class="top">
    <div class="brand">
      <div class="brand-mark"><img src="${logo}"></div>
      <div><h1 class="wordmark">Red Lotus</h1><div class="sub">Einkaufsliste</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <a href="index.html" class="btn ghost sm" style="text-decoration:none;">📅 Kalender</a>
      <button type="button" class="btn ghost sm" id="logoutBtn">Abmelden</button>
    </div>
  </header>
  <nav class="tabs2">
    <button type="button" data-tab2="list" class="${state.view!=='recipes'?'active':''}">Termine</button>
    <button type="button" data-tab2="recipes" class="${state.view==='recipes'?'active':''}">Rezepturen</button>
  </nav>`;
}

function renderList(){
  const today = todayISO();
  const relevant = state.events.filter(e=>RELEVANT_CATEGORIES.includes(e.category||'event'));
  const upcoming = relevant.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past = relevant.filter(e=>e.date<today).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);

  const row = (e)=>{
    const list = state.shoppingLists[e.id];
    const itemCount = list ? list.items.length : 0;
    const checkedCount = list ? list.items.filter(i=>i.checked).length : 0;
    const hasList = itemCount>0;
    const catLabel = CATEGORY_LABELS[e.category||'event'] || 'Event';
    return `<div class="event-row" data-id="${e.id}">
      <div class="date-chip">${fmtDate(e.date)}</div>
      <div class="info"><b>${escapeHtml(e.anlass||'Ohne Bezeichnung')}</b> <span style="opacity:.5;font-size:11px;">${catLabel}</span><div class="meta">${escapeHtml(e.art||'')} · ${e.people||'?'} Personen · ${(e.dishes||[]).length} Gerichte</div></div>
      <div class="badge ${hasList && checkedCount===itemCount && itemCount>0 ? 'done':''}">${hasList ? checkedCount+'/'+itemCount+' erledigt' : 'Keine Liste'}</div>
    </div>`;
  };

  return `
  <div class="panel">
    <h3>Kommende Termine</h3>
    ${upcoming.length ? upcoming.map(row).join('') : '<div class="empty-state">Keine kommenden Termine im Kalender.</div>'}
  </div>
  ${past.length ? `<div class="panel"><h3>Vergangene Termine</h3>${past.map(row).join('')}</div>` : ''}
  `;
}

function renderDetail(){
  const evt = state.events.find(e=>e.id===state.activeEventId);
  if(!evt) return `<div class="empty-state">Termin nicht gefunden.</div>`;
  const list = state.shoppingLists[evt.id] || {items:[]};
  const items = list.items || [];

  const dishRef = (evt.dishes||[]).map(d=>`<div class="dish-ref">
      <span>${escapeHtml(d.name)}${d.variant?' — '+escapeHtml(d.variant):''} <span style="opacity:.55">(${CAT_LABEL[d.category]||d.category})</span></span>
      <span class="qtybit">${d.qty} × Faktor ${d.factor}</span>
    </div>`).join('') || '<div class="empty-state">Keine Gerichte für diesen Termin ausgewählt.</div>';

  const itemRows = items.map((it,idx)=>renderItemRow(it, idx)).join('')
    || '<div class="empty-state" style="padding:20px 0;">Noch keine Einträge — unten hinzufügen oder aus den Rezepturen berechnen lassen.</div>';

  return `
  <a href="#" class="back-link" id="backToList">← Zurück zur Übersicht</a>
  <div class="panel">
    <h3>${escapeHtml(evt.anlass||'Termin')} — ${fmtDate(evt.date)}</h3>
    <div style="font-size:12.5px;opacity:0.75;margin-bottom:10px;">${escapeHtml(evt.art||'')} · ${evt.people||'?'} Personen${evt.address?' · '+escapeHtml(evt.address):''}</div>
    <details><summary style="cursor:pointer;font-size:12.5px;color:var(--gold-soft);margin-bottom:8px;">Gerichte dieses Termins anzeigen</summary>
      <div style="margin-top:8px;">${dishRef}</div>
    </details>
  </div>
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <h3 style="margin:0;">Einkaufsliste</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button type="button" class="btn ghost sm" id="prefillBtn">Aus Rezepturen berechnen</button>
        <button type="button" class="btn gold sm" id="printListBtn">Als PDF drucken</button>
      </div>
    </div>
    <div id="itemsWrap">${itemRows}</div>
    <div class="add-item-row">
      <input type="text" id="newItemName" placeholder="Zutat hinzufügen…">
      <button type="button" class="btn gold sm" id="addItemBtn">+</button>
    </div>
  </div>`;
}

function renderItemRow(it, idx){
  // Neue Zeilen haben mengeProPerson (auch leerer String) gesetzt — alte Einträge
  // (vor dem Umbau angelegt) zeigen weiterhin ihr einfaches Mengenfeld an.
  if(it.mengeProPerson === undefined){
    return `<div class="item-row ${it.checked?'checked':''}" data-idx="${idx}">
      <input type="checkbox" ${it.checked?'checked':''} data-check="${idx}">
      <input type="text" class="item-name" value="${escapeHtml(it.name)}" data-name="${idx}">
      <input type="text" class="item-qty" value="${escapeHtml(it.qty||'')}" placeholder="Menge" data-qty="${idx}">
      <button type="button" class="item-del" data-del="${idx}">✕</button>
    </div>`;
  }
  const ergebnis = formatErgebnis(it.mengeProPerson, it.anzahlPersonen, it.faktor, it.einheit);
  return `<div class="item-row2 ${it.checked?'checked':''}" data-idx="${idx}">
    <div class="item-row2-top">
      <input type="checkbox" ${it.checked?'checked':''} data-check="${idx}">
      <input type="text" class="item-name2" value="${escapeHtml(it.name)}" data-name="${idx}" placeholder="Zutat">
      <button type="button" class="item-del" data-del="${idx}">✕</button>
    </div>
    <div class="item-row2-fields">
      <select data-faktor="${idx}">${FAKTOR_OPTIONS.map(f=>`<option value="${f}" ${String(it.faktor)===String(f)?'selected':''}>Faktor ${f}</option>`).join('')}</select>
      <input type="number" step="0.1" data-menge="${idx}" value="${escapeHtml(it.mengeProPerson)}" placeholder="Menge/Pers.">
      <select data-einheit="${idx}">${EINHEIT_OPTIONS.map(u=>`<option value="${u}" ${it.einheit===u?'selected':''}>${u}</option>`).join('')}</select>
      <input type="number" step="1" data-personen="${idx}" value="${escapeHtml(it.anzahlPersonen)}" placeholder="Personen">
    </div>
    <div class="item-row2-result">→ Ergebnis: <b>${ergebnis}</b></div>
  </div>`;
}

/* ============================= REZEPTUREN ============================= */
function renderRecipes(){
  const recipes = Object.values(state.recipes).sort((a,b)=>(a.name||'').localeCompare(b.name||'', 'de'));
  return `
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <h3 style="margin:0;">Rezepturen</h3>
      <div class="add-item-row" style="margin:0;">
        <input type="text" id="newRecipeName" placeholder="Neues Gericht (Name muss zum Kalender passen)…">
        <button type="button" class="btn gold sm" id="addRecipeBtn">+</button>
      </div>
    </div>
    ${recipes.length ? recipes.map(renderRecipeCard).join('') : '<div class="empty-state">Noch keine Rezepturen angelegt. Der Name sollte genau wie im Kalender geschrieben sein (z. B. „Gelbes Curry"), damit die Einkaufsliste sie automatisch findet.</div>'}
  </div>`;
}
function renderRecipeCard(r){
  const open = !!state.openRecipes[r.id];
  const ingredients = r.ingredients || [];
  const withIdx = ingredients.map((ing,idx)=>({ing,idx}));

  const sections = REZEPT_KATEGORIEN.map(kat=>{
    const inKat = withIdx.filter(x=>(x.ing.kategorie||'Sonstiges')===kat);
    const rows = inKat.map(({ing,idx})=>{
      const ergebnisPreview = formatErgebnis(ing.mengeProPerson, 1, ing.faktor, ing.einheit) + ' / Person';
      return `<div class="item-row2" data-ridx="${idx}">
        <div class="item-row2-top">
          <input type="text" class="item-name2" value="${escapeHtml(ing.zutat)}" data-ring-name="${r.id}|${idx}" placeholder="Zutat">
          <button type="button" class="item-del" data-ring-del="${r.id}|${idx}">✕</button>
        </div>
        <div class="item-row2-fields">
          <select data-ring-faktor="${r.id}|${idx}">${FAKTOR_OPTIONS.map(f=>`<option value="${f}" ${String(ing.faktor)===String(f)?'selected':''}>Faktor ${f}</option>`).join('')}</select>
          <input type="number" step="0.1" data-ring-menge="${r.id}|${idx}" value="${escapeHtml(ing.mengeProPerson)}" placeholder="Menge/Pers.">
          <select data-ring-einheit="${r.id}|${idx}">${EINHEIT_OPTIONS.map(u=>`<option value="${u}" ${ing.einheit===u?'selected':''}>${u}</option>`).join('')}</select>
          <select data-ring-kategorie="${r.id}|${idx}">${REZEPT_KATEGORIEN.map(k=>`<option value="${k}" ${(ing.kategorie||'Sonstiges')===k?'selected':''}>${k}</option>`).join('')}</select>
        </div>
        <div class="item-row2-result" style="opacity:0.6;">${ergebnisPreview}</div>
      </div>`;
    }).join('') || '<div class="empty-state" style="padding:6px 0;font-size:12px;">Keine Einträge.</div>';

    return `<div class="sub-title">${kat}${kat==='Vorrat'?' <span style="opacity:.5;font-weight:400;">(nicht in Einkaufsliste)</span>':''}</div>
      ${rows}
      <div class="add-item-row">
        <input type="text" data-new-ing-name="${r.id}|${kat}" placeholder="Zutat zu ${kat} hinzufügen…">
        <button type="button" class="add-line-btn" data-add-ing="${r.id}|${kat}">+</button>
      </div>`;
  }).join('');

  return `
  <div class="cat-block">
    <div class="cat-title" data-toggle-recipe="${r.id}">
      <span>${escapeHtml(r.name)}</span>
      <span class="tag">${open?'▲':'▼'} ${ingredients.length} Zutaten</span>
    </div>
    <div class="cat-body ${open?'open':''}">
      ${sections}
      <button type="button" class="btn danger sm" data-recipe-del="${r.id}" style="margin-top:12px;">Rezeptur löschen</button>
    </div>
  </div>`;
}

/* ============================= LOGIN ============================= */
function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand-mark"><img src="${state.settings.logo || DEFAULT_LOGO}"></div>
      <h1 class="wordmark">Red Lotus</h1>
      <div class="sub">Einkaufsliste · Anmeldung</div>
      ${state.authError ? `<div class="login-error">${escapeHtml(state.authError)}</div>` : ''}
      <div class="field"><label>E-Mail</label><input type="email" id="login-email" autocomplete="username"></div>
      <div class="field"><label>Passwort</label><input type="password" id="login-pass" autocomplete="current-password"></div>
      <button class="btn gold" id="loginBtn" ${state.authBusy?'disabled':''}>${state.authBusy?'<span class="spinner"></span>Anmelden…':'Anmelden'}</button>
      <div class="login-hint">Gleicher Zugang wie beim Red-Lotus-Kalender.</div>
    </div>
  </div>`;
}
function attachLoginHandlers(){
  const btn = document.getElementById('loginBtn');
  const doLogin = async ()=>{
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    if(!email||!pass){ state.authError='Bitte E-Mail und Passwort eingeben.'; render(); return; }
    state.authBusy = true; state.authError = null; render();
    try{ await signInWithEmailAndPassword(auth, email, pass); }
    catch(e){ state.authBusy=false; state.authError=mapAuthError(e); render(); }
  };
  if(btn) btn.onclick = doLogin;
  ['login-email','login-pass'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.onkeydown = (ev)=>{ if(ev.key==='Enter') doLogin(); };
  });
}
function mapAuthError(e){
  const code = e && e.code || '';
  if(code.includes('invalid-credential')||code.includes('wrong-password')||code.includes('user-not-found')) return 'E-Mail oder Passwort ist falsch.';
  if(code.includes('too-many-requests')) return 'Zu viele Versuche. Bitte kurz warten.';
  return 'Anmeldung fehlgeschlagen: '+(e.message||e);
}

/* ============================= HANDLERS ============================= */
function attachHandlers(){
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = ()=>signOut(auth);

  document.querySelectorAll('[data-tab2]').forEach(b=>b.onclick=()=>{
    state.view = b.dataset.tab2==='recipes' ? 'recipes' : 'list';
    render();
  });

  if(state.view==='list'){
    document.querySelectorAll('.event-row').forEach(row=>row.onclick=()=>{
      state.activeEventId = row.dataset.id;
      state.view = 'detail';
      render();
    });
  }

  if(state.view==='recipes'){
    document.querySelectorAll('[data-toggle-recipe]').forEach(el=>el.onclick=()=>{
      const id = el.dataset.toggleRecipe;
      state.openRecipes[id] = !state.openRecipes[id];
      render();
    });
    const addRecipeBtn = document.getElementById('addRecipeBtn');
    if(addRecipeBtn) addRecipeBtn.onclick = ()=>{
      const nameEl = document.getElementById('newRecipeName');
      const name = nameEl.value.trim();
      if(!name) return;
      const id = uid();
      saveRecipe(id, {name, ingredients:[]});
      state.openRecipes[id] = true;
      nameEl.value='';
    };
    const newRecipeName = document.getElementById('newRecipeName');
    if(newRecipeName) newRecipeName.onkeydown = (ev)=>{ if(ev.key==='Enter') addRecipeBtn.click(); };

    document.querySelectorAll('[data-recipe-del]').forEach(el=>el.onclick=()=>{
      if(confirm('Diese Rezeptur wirklich löschen?')) deleteRecipe(el.dataset.recipeDel);
    });
    document.querySelectorAll('[data-add-ing]').forEach(el=>el.onclick=()=>{
      const [rid, kat] = el.dataset.addIng.split('|');
      const input = document.querySelector(`[data-new-ing-name="${rid}|${kat}"]`);
      const zutat = input.value.trim();
      if(!zutat) return;
      const r = state.recipes[rid];
      const ingredients = (r.ingredients||[]).slice();
      ingredients.push({zutat, mengeProPerson:'', einheit:'g', faktor:1, kategorie:kat});
      saveRecipe(rid, {name:r.name, ingredients});
    });
    document.querySelectorAll('[data-ring-name]').forEach(el=>el.onblur=()=>{
      const [rid, idx] = el.dataset.ringName.split('|');
      const r = state.recipes[rid];
      const ingredients = (r.ingredients||[]).slice();
      ingredients[idx].zutat = el.value;
      saveRecipe(rid, {name:r.name, ingredients});
    });
    document.querySelectorAll('[data-ring-menge]').forEach(el=>el.onblur=()=>{
      const [rid, idx] = el.dataset.ringMenge.split('|');
      const r = state.recipes[rid];
      const ingredients = (r.ingredients||[]).slice();
      ingredients[idx].mengeProPerson = el.value;
      saveRecipe(rid, {name:r.name, ingredients});
    });
    document.querySelectorAll('[data-ring-einheit]').forEach(el=>el.onchange=()=>{
      const [rid, idx] = el.dataset.ringEinheit.split('|');
      const r = state.recipes[rid];
      const ingredients = (r.ingredients||[]).slice();
      ingredients[idx].einheit = el.value;
      saveRecipe(rid, {name:r.name, ingredients});
    });
    document.querySelectorAll('[data-ring-faktor]').forEach(el=>el.onchange=()=>{
      const [rid, idx] = el.dataset.ringFaktor.split('|');
      const r = state.recipes[rid];
      const ingredients = (r.ingredients||[]).slice();
      ingredients[idx].faktor = parseFloat(el.value);
      saveRecipe(rid, {name:r.name, ingredients});
    });
    document.querySelectorAll('[data-ring-kategorie]').forEach(el=>el.onchange=()=>{
      const [rid, idx] = el.dataset.ringKategorie.split('|');
      const r = state.recipes[rid];
      const ingredients = (r.ingredients||[]).slice();
      ingredients[idx].kategorie = el.value;
      saveRecipe(rid, {name:r.name, ingredients});
    });
    document.querySelectorAll('[data-ring-del]').forEach(el=>el.onclick=()=>{
      const [rid, idx] = el.dataset.ringDel.split('|');
      const r = state.recipes[rid];
      const ingredients = (r.ingredients||[]).slice();
      ingredients.splice(idx,1);
      saveRecipe(rid, {name:r.name, ingredients});
    });
  }

  if(state.view==='detail'){
    const back = document.getElementById('backToList');
    if(back) back.onclick = (ev)=>{ ev.preventDefault(); state.view='list'; render(); };

    const evt = state.events.find(e=>e.id===state.activeEventId);
    const currentItems = ()=> (state.shoppingLists[evt.id] || {items:[]}).items.slice();

    document.querySelectorAll('[data-check]').forEach(el=>el.onchange=()=>{
      const items = currentItems();
      items[el.dataset.check].checked = el.checked;
      saveList(evt.id, items);
    });
    document.querySelectorAll('[data-name]').forEach(el=>el.onblur=()=>{
      const items = currentItems();
      items[el.dataset.name].name = el.value;
      saveList(evt.id, items);
    });
    document.querySelectorAll('[data-qty]').forEach(el=>el.onblur=()=>{
      const items = currentItems();
      items[el.dataset.qty].qty = el.value;
      saveList(evt.id, items);
    });
    document.querySelectorAll('[data-menge]').forEach(el=>el.onblur=()=>{
      const items = currentItems();
      items[el.dataset.menge].mengeProPerson = el.value;
      saveList(evt.id, items);
    });
    document.querySelectorAll('[data-personen]').forEach(el=>el.onblur=()=>{
      const items = currentItems();
      items[el.dataset.personen].anzahlPersonen = el.value;
      saveList(evt.id, items);
    });
    document.querySelectorAll('[data-einheit]').forEach(el=>el.onchange=()=>{
      const items = currentItems();
      items[el.dataset.einheit].einheit = el.value;
      saveList(evt.id, items);
    });
    document.querySelectorAll('[data-faktor]').forEach(el=>el.onchange=()=>{
      const items = currentItems();
      items[el.dataset.faktor].faktor = parseFloat(el.value);
      saveList(evt.id, items);
    });
    document.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>{
      const items = currentItems();
      items.splice(el.dataset.del,1);
      saveList(evt.id, items);
    });

    const addBtn = document.getElementById('addItemBtn');
    if(addBtn) addBtn.onclick = ()=>{
      const nameEl = document.getElementById('newItemName');
      const name = nameEl.value.trim();
      if(!name) return;
      const items = currentItems();
      items.push({id:uid(), name, checked:false, mengeProPerson:'', einheit:'g', faktor:1, anzahlPersonen:evt.people||''});
      saveList(evt.id, items);
      nameEl.value='';
      nameEl.focus();
    };
    const newItemName = document.getElementById('newItemName');
    if(newItemName) newItemName.onkeydown = (ev)=>{ if(ev.key==='Enter') addBtn.click(); };

    const prefillBtn = document.getElementById('prefillBtn');
    if(prefillBtn) prefillBtn.onclick = ()=>{
      const items = currentItems();
      const recipeList = Object.values(state.recipes);
      (evt.dishes||[]).forEach(d=>{
        const match = recipeList.find(r=>(r.name||'').trim().toLowerCase() === (d.name||'').trim().toLowerCase());
        if(match && match.ingredients && match.ingredients.length){
          const relevante = match.ingredients.filter(ing=>REZEPT_KATEGORIEN_FUER_EINKAUF.includes(ing.kategorie||'Sonstiges'));
          relevante.forEach(ing=>{
            items.push({
              id:uid(), name:ing.zutat, checked:false,
              mengeProPerson: ing.mengeProPerson, einheit: ing.einheit||'g',
              faktor: ing.faktor||1, anzahlPersonen: evt.people||''
            });
          });
        } else {
          items.push({
            id:uid(), name:'Zutaten für '+d.name+(d.variant?' ('+d.variant+')':'')+' — Rezeptur fehlt',
            checked:false, mengeProPerson:'', einheit:'g', faktor:1, anzahlPersonen: evt.people||''
          });
        }
      });
      saveList(evt.id, items);
    };

    const printBtn = document.getElementById('printListBtn');
    if(printBtn) printBtn.onclick = ()=>openPrint(evt);
  }
}

function openPrint(evt){
  const list = state.shoppingLists[evt.id] || {items:[]};
  const items = list.items || [];
  const logo = state.settings.logo || DEFAULT_LOGO;
  const rows = items.map(it=>{
    const mengeText = it.mengeProPerson !== undefined
      ? formatErgebnis(it.mengeProPerson, it.anzahlPersonen, it.faktor, it.einheit)
      : (it.qty||'');
    return `<div class="print-list-item">
      <div class="print-checkbox ${it.checked?'checked':''}"></div>
      <div style="flex:1;">${escapeHtml(it.name)}</div>
      <div style="opacity:0.7;">${escapeHtml(mengeText)}</div>
    </div>`;
  }).join('') || '<p>Keine Einträge.</p>';
  const html = `
    <div class="print-toolbar">
      <button class="btn gold" onclick="window.print()">Drucken / Als PDF speichern</button>
      <button class="btn ghost" onclick="document.getElementById('printArea').classList.remove('show')">Schließen</button>
    </div>
    <div class="print-body">
      <div class="print-header">
        <div class="logo"><img src="${logo}"></div>
        <div><h1>Red Lotus Asian Food</h1><div class="sub">Einkaufsliste</div></div>
      </div>
      <p style="font-size:13px;"><b>${escapeHtml(evt.anlass||'Termin')}</b> — ${fmtDate(evt.date)} · ${evt.people||'?'} Personen</p>
      ${rows}
    </div>`;
  const pa = document.getElementById('printArea');
  pa.innerHTML = html;
  pa.classList.add('show');
}

/* ============================= INIT ============================= */
onAuthStateChanged(auth, (user)=>{
  if(user){
    state.authUser = user; state.authError=null; state.authBusy=false;
    if(!state.loaded){ startSync(); }
  } else {
    state.authUser = null; state.loaded=false; stopSync();
  }
  render();
});
render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
