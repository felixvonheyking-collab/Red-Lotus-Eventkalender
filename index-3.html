<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Work+Sans:wght@400;500;600;700&family=Zilla+Slab:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#1c1b1a;
  --ink-2:#2a2726;
  --ink-3:#3a3634;
  --red:#8f1d33;
  --red-deep:#6b1526;
  --red-bright:#b02942;
  --gold:#c9a35e;
  --gold-soft:#e4cf9c;
  --cream:#f6efe2;
  --cream-dim:#e9ddc6;
  --line:rgba(201,163,94,0.28);
  --ok:#5c8362;
  --warn:#c9793e;
  --shadow:0 12px 32px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(143,29,51,0.25), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(201,163,94,0.12), transparent 55%),
    var(--ink);
  color:var(--cream);
  font-family:'Work Sans',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wordmark{
  font-family:'Marcellus',serif;
  letter-spacing:0.04em;
}
.app{max-width:1180px;margin:0 auto;padding:20px 16px 80px;}

/* HEADER */
header.top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-radius:16px;
  background:linear-gradient(135deg, var(--ink-2), var(--ink-3));
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  margin-bottom:18px;
  gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--red-bright), var(--red-deep) 70%);
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Marcellus',serif;color:var(--gold-soft);font-size:20px;
  flex-shrink:0;overflow:hidden;
}
.brand-mark img{width:100%;height:100%;object-fit:cover;}
.brand h1{font-size:20px;margin:0;font-weight:600;}
.brand .sub{font-size:12px;color:var(--gold-soft);opacity:0.85;letter-spacing:0.08em;text-transform:uppercase;}
nav.tabs{display:flex;gap:6px;flex-wrap:wrap;}
nav.tabs button{
  background:transparent;border:1px solid var(--line);color:var(--cream);
  padding:9px 14px;border-radius:10px;font-size:13px;cursor:pointer;
  font-family:'Work Sans',sans-serif;font-weight:500;transition:all .15s;
}
nav.tabs button.active{background:var(--red);border-color:var(--red-bright);color:#fff;}
nav.tabs button:hover{border-color:var(--gold);}

/* CALENDAR */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-head h2{font-family:'Marcellus',serif;font-size:26px;margin:0;font-weight:400;}
.cal-nav{display:flex;gap:8px;align-items:center;}
.cal-nav button{
  background:var(--ink-2);border:1px solid var(--line);color:var(--gold-soft);
  width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:16px;
}
.cal-nav button:hover{border-color:var(--gold);}
.cal-nav .today-btn{width:auto;padding:0 14px;font-size:12px;letter-spacing:0.05em;text-transform:uppercase;}
.grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:6px;
}
.dow{text-align:center;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold-soft);opacity:0.8;padding:4px 0 8px;}
.day{
  position:relative;min-height:82px;border-radius:12px;
  background:var(--ink-2);border:1px solid transparent;
  padding:7px;cursor:pointer;transition:all .12s;
}
.day:hover{border-color:var(--gold);background:var(--ink-3);}
.day.empty{background:transparent;cursor:default;}
.day.empty:hover{border-color:transparent;background:transparent;}
.day.today{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold);}
.day .num{font-size:13px;font-weight:600;color:var(--cream);opacity:0.9;}
.day.today .num{color:var(--gold-soft);}
.day .evt-chip{
  margin-top:5px;font-size:10.5px;background:var(--red);color:#fff;
  padding:2px 6px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:3px;font-weight:500;
}
.day .evt-more{font-size:10px;color:var(--gold-soft);opacity:0.8;}

/* PANELS / CARDS */
.panel{
  background:var(--ink-2);border:1px solid var(--line);border-radius:16px;
  padding:20px;margin-top:18px;box-shadow:var(--shadow);
}
.panel h3{font-family:'Marcellus',serif;font-size:19px;margin:0 0 14px;font-weight:400;color:var(--gold-soft);}
.day-events-list{display:flex;flex-direction:column;gap:10px;}
.evt-row{
  background:var(--ink-3);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
}
.evt-row .info b{font-size:14.5px;}
.evt-row .info .meta{font-size:12px;color:var(--cream);opacity:0.7;margin-top:2px;}
.evt-row .actions{display:flex;gap:6px;flex-wrap:wrap;}

/* BUTTONS */
button{font-family:'Work Sans',sans-serif;}
.btn{
  background:var(--red);color:#fff;border:none;padding:9px 14px;border-radius:9px;
  cursor:pointer;font-size:13px;font-weight:600;letter-spacing:0.01em;transition:background .15s;
}
.btn:hover{background:var(--red-bright);}
.btn.gold{background:var(--gold);color:var(--ink);}
.btn.gold:hover{background:var(--gold-soft);}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--cream);}
.btn.ghost:hover{border-color:var(--gold);}
.btn.danger{background:transparent;border:1px solid var(--red);color:#e79aa7;}
.btn.danger:hover{background:var(--red);color:#fff;}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:7px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* FORMS */
label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--gold-soft);margin-bottom:5px;opacity:0.9;}
input[type=text],input[type=email],input[type=tel],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--ink);border:1px solid var(--line);color:var(--cream);
  padding:9px 11px;border-radius:9px;font-size:14px;font-family:'Work Sans',sans-serif;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media (max-width:640px){.field-row,.field-row3{grid-template-columns:1fr;}}
.pill-select{display:flex;gap:8px;flex-wrap:wrap;}
.pill{
  border:1px solid var(--line);background:var(--ink);color:var(--cream);
  padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;
}
.pill.selected{background:var(--red);border-color:var(--red-bright);color:#fff;}
.hint{font-size:11.5px;color:var(--cream);opacity:0.55;margin-top:4px;}
a.link-chip{color:var(--gold-soft);text-decoration:none;border-bottom:1px dotted var(--gold);font-size:13px;}
a.link-chip:hover{color:#fff;}

/* MODAL */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(2px);
  display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;overflow-y:auto;z-index:100;
}
.modal{
  background:var(--ink);border:1px solid var(--line);border-radius:18px;
  max-width:760px;width:100%;padding:0;box-shadow:0 30px 60px rgba(0,0,0,0.55);
  margin-bottom:40px;
}
.modal-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 22px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--ink);border-radius:18px 18px 0 0;z-index:2;
}
.modal-head h3{margin:0;font-family:'Marcellus',serif;font-weight:400;font-size:20px;color:var(--gold-soft);}
.modal-body{padding:22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;position:sticky;bottom:0;background:var(--ink);border-radius:0 0 18px 18px;}
.close-x{background:transparent;border:none;color:var(--cream);font-size:22px;cursor:pointer;line-height:1;opacity:0.7;}
.close-x:hover{opacity:1;}

/* DISH ACCORDION */
.cat-block{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.cat-title{
  background:var(--ink-2);padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;font-weight:600;font-size:14px;
}
.cat-title .tag{font-size:11px;color:var(--gold-soft);opacity:0.7;font-weight:400;}
.cat-body{padding:12px 14px;display:none;background:var(--ink-3);}
.cat-body.open{display:block;}
.sub-title{font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--gold-soft);margin:12px 0 8px;opacity:0.85;}
.sub-title:first-child{margin-top:0;}
.dish-item{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:7px 4px;border-bottom:1px dashed var(--line);font-size:13.5px;
}
.dish-item:last-child{border-bottom:none;}
.dish-item .dname{display:flex;align-items:center;gap:6px;}
.icon-btn{background:none;border:none;color:var(--gold-soft);opacity:0.6;cursor:pointer;font-size:13px;padding:2px 4px;}
.icon-btn:hover{opacity:1;}
.add-line-btn{
  background:var(--ink);border:1px solid var(--gold);color:var(--gold-soft);
  padding:5px 10px;border-radius:7px;font-size:12px;cursor:pointer;
}
.add-line-btn:hover{background:var(--gold);color:var(--ink);}
.add-custom-row{margin-top:10px;display:flex;gap:8px;}
.add-custom-row input{flex:1;}

/* SELECTED DISHES TABLE */
table.dish-table{width:100%;border-collapse:collapse;margin-top:6px;}
table.dish-table th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;
  color:var(--gold-soft);opacity:0.8;padding:6px 8px;border-bottom:1px solid var(--line);
}
table.dish-table td{padding:6px 8px;border-bottom:1px solid rgba(201,163,94,0.12);font-size:13px;vertical-align:middle;}
table.dish-table select,table.dish-table input{padding:5px 7px;font-size:12.5px;}
.qty-input{width:56px;}
.total-row td{font-weight:700;font-size:14px;padding-top:10px;color:var(--gold-soft);}

/* PRINT VIEWS (hidden on screen, shown when printing) */
.print-only{display:none;}
#printArea{position:fixed;inset:0;background:#fff;z-index:9999;overflow:auto;padding:40px;display:none;}
#printArea.show{display:block;}
.rl-print-header{display:flex;align-items:center;gap:16px;border-bottom:3px solid #8f1d33;padding-bottom:14px;margin-bottom:20px;}
.rl-print-logo{width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#b02942,#6b1526 70%);border:2px solid #c9a35e;flex-shrink:0;}
.rl-print-logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.rl-print-header h1{font-family:'Marcellus',serif;color:#6b1526;margin:0;font-size:22px;}
.rl-print-header .sub{font-size:12px;color:#8f1d33;text-transform:uppercase;letter-spacing:0.08em;}
.print-body{color:#1c1b1a;font-family:'Work Sans',sans-serif;max-width:800px;margin:0 auto;}
.print-body table{width:100%;border-collapse:collapse;margin:14px 0;}
.print-body th{background:#f6efe2;color:#6b1526;text-align:left;padding:8px 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:0.04em;border-bottom:2px solid #c9a35e;}
.print-body td{padding:8px 10px;border-bottom:1px solid #e9ddc6;font-size:13px;}
.print-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:16px;font-size:13px;}
.print-meta-grid div b{color:#6b1526;}
.print-toolbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:16px;}
.print-footnote{font-size:11px;color:#7a746a;margin-top:24px;border-top:1px solid #e9ddc6;padding-top:10px;}

/* Rechnungs-/Angebots-Layout nach Vorlage */
.invoice-body{max-width:760px;}
.inv-topline{color:#8f1d33;font-size:10.5px;margin-bottom:18px;}
.inv-header-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px;}
.inv-recipient{font-size:13px;line-height:1.6;padding-top:10px;}
.inv-sender{text-align:right;font-size:12px;line-height:1.6;}
.inv-sender .rl-print-logo{margin-left:auto;margin-bottom:8px;width:64px;height:64px;}
.inv-title{color:#8f1d33;font-family:'Marcellus',serif;font-weight:400;font-size:26px;margin:10px 0 8px;}
.inv-meta{display:flex;gap:26px;flex-wrap:wrap;font-size:12.5px;margin-bottom:16px;}
table.inv-table{width:100%;border-collapse:collapse;margin-bottom:6px;}
table.inv-table th{background:#8f1d33;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:0.03em;padding:7px 9px;text-align:left;}
table.inv-table td{padding:7px 9px;font-size:12.5px;border-bottom:1px solid #e9ddc6;}
table.inv-summary{width:100%;border-collapse:collapse;margin:2px 0 20px;}
table.inv-summary td{padding:6px 10px;font-size:12.5px;background:#f1efe9;border-bottom:2px solid #fff;}
table.inv-summary tr.inv-total-row td{background:#8f1d33;color:#fff;}
table.inv-dishes{width:100%;border-collapse:collapse;margin-bottom:20px;}
table.inv-dishes th{border:1px solid #c9a35e;background:#f6efe2;color:#6b1526;font-size:11.5px;padding:7px;text-align:center;}
table.inv-dishes td{border:1px solid #e9ddc6;font-size:12px;padding:6px;text-align:center;}
.inv-footer{display:grid;grid-template-columns:1.3fr 1fr 1.3fr;gap:12px;background:#efefef;font-size:10.5px;padding:10px 12px;line-height:1.5;}
.doc-type-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}

@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{position:absolute;inset:0;padding:0;display:block !important;}
  .print-toolbar{display:none !important;}
  .app,.overlay{display:none !important;}
}
[contenteditable="true"]{outline:none;border-bottom:1px dashed #c9a35e;}
[contenteditable="true"]:focus{background:#fbf7ee;}

.empty-state{text-align:center;padding:40px 20px;color:var(--cream);opacity:0.6;font-size:13.5px;}
.thumb{width:34px;height:34px;border-radius:7px;object-fit:cover;border:1px solid var(--line);}
.small-note{font-size:11px;opacity:0.6;margin-top:2px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{
  background:linear-gradient(135deg, var(--ink-2), var(--ink-3));
  border:1px solid var(--line);border-radius:18px;padding:32px 26px;max-width:380px;width:100%;
  box-shadow:var(--shadow);text-align:center;
}
.login-card .brand-mark{width:56px;height:56px;font-size:24px;margin:0 auto 14px;}
.login-card h1{font-family:'Marcellus',serif;font-weight:400;font-size:24px;margin:0 0 4px;}
.login-card .sub{font-size:12px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:22px;}
.login-card .field{text-align:left;}
.login-card .btn{width:100%;padding:11px;margin-top:6px;}
.login-error{background:rgba(143,29,51,0.25);border:1px solid var(--red);color:#f2c9d1;font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:14px;text-align:left;}
.login-hint{font-size:11.5px;opacity:0.55;margin-top:18px;line-height:1.5;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(246,239,226,0.3);border-top-color:var(--cream);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

/* ======================================================================
   FIREBASE — EINRICHTUNG (Google-Anmeldung + Firebase Hosting)

   6. Deployment über Firebase Hosting: siehe EINRICHTUNG.md.

/* Sichtbare Fehleranzeige — falls beim Start etwas schiefgeht (z. B. defekte
   Firebase-Konfiguration oder ein blockiertes Skript), erscheint der genaue
   Fehlertext direkt auf der Seite, auch ohne Entwickler-Konsole. */
function showFatalError(title, detail){
  const el = document.getElementById('app');
  if(!el) return;
  el.innerHTML = `<div style="max-width:600px;margin:60px auto;padding:20px;background:#2a1116;border:1px solid #b02942;border-radius:14px;color:#f6efe2;font-family:sans-serif;">
    <h2 style="color:#f2c9d1;margin-top:0;">${title}</h2>
    <p style="font-size:13px;opacity:0.85;white-space:pre-wrap;word-break:break-word;">${(detail||'').toString().replace(/</g,'&lt;')}</p>
    <p style="font-size:12px;opacity:0.6;">Bitte mach hiervon einen Screenshot.</p>
  </div>`;
}
window.addEventListener('error', (ev)=>{
  showFatalError('Es ist ein Fehler aufgetreten', (ev.message||'')+' ('+(ev.filename||'')+':'+(ev.lineno||'')+')');
});
window.addEventListener('unhandledrejection', (ev)=>{
  showFatalError('Es ist ein Fehler aufgetreten', ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason));
});

/* ============================= GOOGLE KALENDER SYNC ============================= */
// Eigenständiger OAuth-Zugriff nur für die Google-Calendar-API (unabhängig vom
// normalen Login). Muss einmalig in der Google Cloud Console eingerichtet werden:
// 1. "Google Calendar API" aktivieren (APIs & Dienste -> Bibliothek)
// 2. Einen OAuth-Client (Web-Anwendung) anlegen (APIs & Dienste -> Anmeldedaten
//    -> Anmeldedaten erstellen -> OAuth-Client-ID), autorisierter JavaScript-
//    Ursprung: https://felixvonheyking-collab.github.io
// 3. Die dabei angezeigte Client-ID unten eintragen.
const GOOGLE_OAUTH_CLIENT_ID = "864967561482-7qeln3l8628vvuug4vr4o4l35crqkdkj.apps.googleusercontent.com";
const GCAL_SCOPE = "https://www.googleapis.com/auth/calendar.events";
const APP_BASE_URL = "https://felixvonheyking-collab.github.io/Event-Kalender-red-lotus/";

let gcalTokenClient = null;
let gcalAccessToken = null; // nur im Arbeitsspeicher, nie gespeichert — läuft nach ca. 1 Std. ab

function ensureGcalTokenClient(){
  if(gcalTokenClient || typeof google === 'undefined' || !google.accounts) return;
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_OAUTH_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: (resp)=>{
      if(resp && resp.access_token){
        gcalAccessToken = resp.access_token;
        showToast('Mit Google Kalender verbunden ✓', false);
        render();
      } else {
        showToast('Google-Kalender-Verbindung fehlgeschlagen.', true);
      }
    }
  });
}
function connectGoogleCalendar(){
  ensureGcalTokenClient();
  if(!gcalTokenClient){ showToast('Google-Anmeldedienst noch nicht bereit, bitte kurz warten und erneut versuchen.', true); return; }
  gcalTokenClient.requestAccessToken();
}
function gcalDescriptionFor(evt){
  const link = APP_BASE_URL + 'index.html?event=' + encodeURIComponent(evt.id);
  const lines = [];
  if(evt.contactName) lines.push('Ansprechpartner: '+evt.contactName);
  if(evt.phone) lines.push('Telefon: '+evt.phone);
  if(evt.email) lines.push('E-Mail: '+evt.email);
  if(evt.people) lines.push('Personen: '+evt.people);
  if(evt.notes) lines.push('Notizen: '+evt.notes);
  lines.push('');
  lines.push('Im Red-Lotus-Kalender öffnen: '+link);
  return lines.join('\n');
}
async function syncEventToGoogleCalendar(evt){
  if(!gcalAccessToken){
    showToast('Bitte zuerst in den Einstellungen „Mit Google Kalender verbinden" antippen.', true);
    return;
  }
  const body = {
    summary: '🔴 ' + (evt.anlass || 'Red Lotus Termin'),
    description: gcalDescriptionFor(evt),
    location: evt.address || '',
    start: { date: evt.date },
    end: { date: evt.date }
  };
  try{
    let res, url;
    if(evt.gcalEventId){
      url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events/'+evt.gcalEventId;
      res = await fetch(url, { method:'PATCH', headers:{ 'Authorization':'Bearer '+gcalAccessToken, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
    } else {
      url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events';
      res = await fetch(url, { method:'POST', headers:{ 'Authorization':'Bearer '+gcalAccessToken, 'Content-Type':'application/json' }, body: JSON.stringify(body) });
    }
    if(res.status === 401){
      gcalAccessToken = null;
      showToast('Google-Kalender-Zugriff abgelaufen — bitte in den Einstellungen erneut verbinden.', true);
      return;
    }
    if(!res.ok){
      const errText = await res.text();
      showToast('Google Kalender: Fehler beim Speichern ('+res.status+')', true);
      console.error('Google Calendar API Fehler:', errText);
      return;
    }
    const data = await res.json();
    if(!evt.gcalEventId){
      evt.gcalEventId = data.id;
      await saveEventDoc(evt);
    }
    showToast('In Google Kalender gespeichert ✓', false);
  }catch(err){
    console.error('Fehler beim Google-Kalender-Sync:', err);
    showToast('Google Kalender: Verbindungsfehler', true);
  }
}

let unsubEvents=null, unsubCustom=[], unsubCustomTL=[], unsubMeta=null, unsubSettings=null;

const CUSTOM_CATS_TL = ['vorspeisen','hauptspeisen','desserts','snacks'];

function startFirestoreSync(){
  unsubEvents = onSnapshot(collection(db,'events'), snap=>{
    state.events = snap.docs.map(d=>d.data());
    state.loaded = true;
    handleDeepLinkOnce();
    render();
  }, err=>{ console.error('Firestore-Fehler (events):', err); state.loaded = true; handleFirestoreError(err); render(); });

  unsubMeta = onSnapshot(collection(db,'dishMeta'), snap=>{
    const meta = {};
    snap.docs.forEach(d=>{ meta[d.id]=d.data(); });
    state.dishMeta = meta;
    state.storageOk = true;
    render();
  }, err=>{ console.error('Firestore-Fehler (dishMeta):', err); handleFirestoreError(err); });

  unsubSettings = onSnapshot(doc(db,'settings','main'), d=>{
    state.settings = d.exists() ? d.data() : {logo:null};
    render();
  }, err=>{ console.error('Firestore-Fehler (settings):', err); handleFirestoreError(err); });

  CUSTOM_CATS.forEach(catKey=>{
    const unsub = onSnapshot(doc(db,'customDishes',catKey), d=>{
      state.customDishes[catKey] = d.exists() ? (d.data().items||[]) : [];
      render();
    }, err=>{ console.error('Firestore-Fehler (customDishes/'+catKey+'):', err); handleFirestoreError(err); });
    unsubCustom.push(unsub);
  });

  CUSTOM_CATS_TL.forEach(catKey=>{
    const unsub = onSnapshot(doc(db,'customDishesTL',catKey), d=>{
      state.customDishesTL[catKey] = d.exists() ? (d.data().items||[]) : [];
      render();
    }, err=>{ console.error('Firestore-Fehler (customDishesTL/'+catKey+'):', err); handleFirestoreError(err); });
    unsubCustomTL.push(unsub);
  });
}

// Wird ausgelöst, wenn ein zwar mit Google angemeldetes, aber nicht in den
// Firestore-Regeln freigeschaltetes Konto versucht, Daten zu lesen.
function handleFirestoreError(err){
  const code = err && err.code || 'unbekannt';
  const msg = err && err.message || String(err);
  console.error('Firestore-Fehler-Detail:', code, msg);
  if(code === 'permission-denied' && state.authUser){
    state.authError = 'Dieses Konto ('+state.authUser.email+') ist für den Red-Lotus-Kalender nicht freigeschaltet. Bitte bei Felix melden.';
    stopFirestoreSync();
    signOut(auth);
  } else {
    markStorageIssue();
    showToast('Datenbankfehler: '+code+' — '+msg, true);
  }
}
function stopFirestoreSync(){
  if(unsubEvents) unsubEvents();
  if(unsubMeta) unsubMeta();
  if(unsubSettings) unsubSettings();
  unsubCustom.forEach(u=>u());
  unsubCustom=[];
  unsubCustomTL.forEach(u=>u());
  unsubCustomTL=[];
}

    state.editingEvent = JSON.parse(JSON.stringify(evt));
    if(!state.editingEvent.category) state.editingEvent.category = 'event';
  }

function showToast(text, isError){
  let el = document.getElementById('rlToast');
  if(!el){
    el = document.createElement('div');
    el.id = 'rlToast';
    el.style.cssText = 'position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 18px;border-radius:10px;font-size:13px;font-family:sans-serif;max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.4);cursor:pointer;';
    el.onclick = ()=>{ el.style.display='none'; };
    document.body.appendChild(el);
  }
  el.style.background = isError ? '#8f1d33' : '#3d6b4a';
  el.style.color = '#f6efe2';
  el.textContent = text + (isError ? ' (antippen zum Schließen)' : '');
  el.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ el.style.display='none'; }, isError ? 60000 : 3000);
}

/* Bilder vor dem Speichern verkleinern/komprimieren, damit Firestore-Dokumente
   (Limit 1 MB pro Dokument) nicht zu groß werden. */
function compressImageFile(file, maxDim=700, quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = reject;
      img.onload = ()=>{
        let {width,height} = img;
        if(width>height && width>maxDim){ height = Math.round(height*maxDim/width); width=maxDim; }
        else if(height>maxDim){ width = Math.round(width*maxDim/height); height=maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width=width; canvas.height=height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* Backup / Wiederherstellung als JSON-Datei — zusätzliches Sicherheitsnetz. */
function exportBackup(){
  const payload = { events: state.events, customDishes: state.customDishes, customDishesTL: state.customDishesTL, dishMeta: state.dishMeta, settings: state.settings, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'red-lotus-kalender-backup-'+todayISO()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
async function importBackup(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!confirm('Backup einspielen? Das überschreibt die aktuell in der Cloud gespeicherten Termine und Gerichte für dein ganzes Team.')) return;
      const events = data.events||[];
      for(const ev of events){ await saveEventDoc(ev); }
      const cd = data.customDishes||{};
      for(const catKey of CUSTOM_CATS){ state.customDishes[catKey]=cd[catKey]||[]; await saveCustomDishCategory(catKey); }
      const cdTL = data.customDishesTL||{};
      for(const catKey of CUSTOM_CATS_TL){ state.customDishesTL[catKey]=cdTL[catKey]||[]; await saveCustomDishCategoryTL(catKey); }
      const dm = data.dishMeta||{};
      for(const itemId of Object.keys(dm)){ state.dishMeta[itemId]=dm[itemId]; await saveDishMetaItem(itemId); }
      state.settings = data.settings||state.settings;
      await saveSettingsDoc();
      alert('Backup eingespielt.');
    }catch(e){ alert('Diese Datei konnte nicht gelesen werden.'); }
  };
  reader.readAsText(file);
}

    if(!email || !pass){ state.authError = 'Bitte E-Mail und Passwort eingeben.'; render(); return; }
    state.authBusy = true; state.authError = null; render();
    try{
      await signInWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged übernimmt den Rest
    }catch(e){
      state.authBusy = false;
      state.authError = mapAuthError(e);
      render();
    }
  };
  if(btn) btn.onclick = doLogin;
  ['login-email','login-pass'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.onkeydown = (ev)=>{ if(ev.key==='Enter') doLogin(); };
  });

  const googleBtn = document.getElementById('googleLoginBtn');
  if(googleBtn) googleBtn.onclick = async ()=>{
    state.authBusy = true; state.authError = null; render();
    try{
      await signInWithPopup(auth, googleProvider);
      // onAuthStateChanged übernimmt den Rest
    }catch(e){
      state.authBusy = false;
      state.authError = mapAuthError(e);
      render();
    }
  };
}
function mapAuthError(e){
  const code = e && e.code || '';
  if(code.includes('invalid-credential') || code.includes('wrong-password') || code.includes('user-not-found')) return 'E-Mail oder Passwort ist falsch.';
  if(code.includes('too-many-requests')) return 'Zu viele Versuche. Bitte kurz warten und erneut versuchen.';
  if(code.includes('invalid-email')) return 'Diese E-Mail-Adresse ist ungültig.';
  if(code.includes('popup-closed-by-user') || code.includes('cancelled-popup-request')) return 'Google-Anmeldung abgebrochen.';
  if(code.includes('popup-blocked')) return 'Der Anmelde-Pop-up wurde blockiert. Bitte Pop-ups für diese Seite erlauben, oder nutze die E-Mail-Anmeldung.';
  if(code === 'permission-denied' || code.includes('permission-denied')) return 'Dieses Konto ist für den Red-Lotus-Kalender nicht freigeschaltet. Bitte bei Felix melden.';
  return 'Anmeldung fehlgeschlagen: '+(e.message||e);
}


/* ============================= HELPERS ============================= */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtEUR(n){ return (Math.round(n*100)/100).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function isoDate(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayISO(){ const t=new Date(); return isoDate(t.getFullYear(),t.getMonth(),t.getDate()); }
function mapsLink(addr){ return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(addr); }
function allCategoryItems(catKey){
  const cfg = getActiveDishConfig();
  const base = cfg.db[catKey].items.slice();
  const customStore = state[cfg.custom];
  const custom = (customStore[catKey]||[]).map(c=>({id:c.id,name:c.name,isCustom:true,
    variants: cfg.db[catKey].customVariants ? cfg.db[catKey].customVariants : null }));
  return base.concat(custom);
}
function lineUnitPrice(catKey,item,variant,manualPrice){
  const cfg = getActiveDishConfig();
  if(item.isCustom && cfg.db[catKey].customIndividual){ return manualPrice||0; }
  if(item.variants && variant && item.variants[variant]!==undefined) return item.variants[variant];
  return manualPrice||0;
}
function eventDishTotal(evt){
  return (evt.dishes||[]).reduce((s,d)=>s+(d.unitPrice*d.qty*d.factor),0);
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================= RENDER ROOT ============================= */
function render(){
  const app = document.getElementById('app');

  if(!state.authUser){
    app.innerHTML = renderLogin();
    attachLoginHandlers();
    return;
  }
  if(!state.loaded){ app.innerHTML = '<div class="empty-state">Lade Kalender…</div>'; return; }

  // Scroll-Position sichern (Seite + Modal-Overlay), damit sie beim Neuzeichnen nicht springt
  const winScroll = window.scrollY;
  const overlayEl = document.getElementById('eventOverlay');
  const overlayScroll = overlayEl ? overlayEl.scrollTop : 0;
  const activeId = document.activeElement ? document.activeElement.id : null;
  const activeSelStart = (document.activeElement && typeof document.activeElement.selectionStart === 'number') ? document.activeElement.selectionStart : null;

  app.innerHTML = `
    ${renderHeader()}
    ${state.tab==='kalender' ? renderKalenderTab() : renderEinstellungenTab()}
  `;
  attachGlobalHandlers();

  // Scroll-Position wiederherstellen
  window.scrollTo(0, winScroll);
  const newOverlayEl = document.getElementById('eventOverlay');
  if(newOverlayEl) newOverlayEl.scrollTop = overlayScroll;
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus({preventScroll:true});
      if(activeSelStart!==null && typeof el.setSelectionRange==='function'){
        try{ el.setSelectionRange(activeSelStart, activeSelStart); }catch(e){}
      }
    }
  }
}

/* ============================= KALENDER TAB ============================= */
function renderKalenderTab(){
  const y = state.viewYear, m = state.viewMonth;
  const firstDow = (new Date(y,m,1).getDay()+6)%7; // Monday=0
  const daysInMonth = new Date(y,m+1,0).getDate();
  let cells = '';
  for(let i=0;i<firstDow;i++) cells += `<div class="day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = isoDate(y,m,d);
    const dayEvents = state.events.filter(e=>e.date===iso).sort((a,b)=>(a.anlass||'').localeCompare(b.anlass||''));
    const isToday = iso===todayISO();
    let chips = dayEvents.slice(0,2).map(e=>`<div class="evt-chip" style="background:${CATEGORY_COLORS[e.category||'event']};">${escapeHtml(e.anlass||'Termin')}</div>`).join('');
    if(dayEvents.length>2) chips += `<div class="evt-more">+${dayEvents.length-2} weitere</div>`;
    cells += `<div class="day ${isToday?'today':''}" data-date="${iso}">
        <div class="num">${d}</div>
        ${chips}
      </div>`;
  }
  const sel = state.selectedDate;
  return `
  <div class="cal-head">
    <h2 class="wordmark">${MONTHS[m]} ${y}</h2>
    <div class="cal-nav">
      <button type="button" id="prevMonth">‹</button>
      <button type="button" class="today-btn" id="gotoToday">Heute</button>
      <button type="button" id="nextMonth">›</button>
    </div>
  </div>
  <div class="grid">
    ${DOWS.map(d=>`<div class="dow">${d}</div>`).join('')}
    ${cells}
  </div>
  ${sel ? renderDayPanel(sel) : ''}
  ${state.editingEvent ? renderEventModal() : ''}
  `;
}

function renderDayPanel(iso){
  const [y,m,d] = iso.split('-').map(Number);
  const dayEvents = state.events.filter(e=>e.date===iso);
  const dateLabel = new Date(y,m-1,d).toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  return `
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
      <h3 style="margin:0;">${dateLabel}</h3>
      <button type="button" class="btn gold sm" id="newEventBtn">+ Neuer Termin</button>
    </div>
    ${dayEvents.length===0 ? `<div class="empty-state">Noch keine Termine an diesem Tag.</div>` : `
    <div class="day-events-list">
      ${dayEvents.map(e=>renderEventRow(e)).join('')}
    </div>`}
  </div>`;
}

function renderEventRow(e){
  const cat = e.category || 'event';
  const color = CATEGORY_COLORS[cat];
  const total = eventDishTotal(e);
  let meta = '';
  if(cat==='sonstiges'){
    meta = `${escapeHtml(e.anlass||'—')} · ${escapeHtml(String(e.people||'—'))}${e.sonstOrt?' · '+escapeHtml(e.sonstOrt):''}${e.sonstWie?' · '+escapeHtml(e.sonstWie):''}`;
  } else if(cat==='wochenmarkt'){
    meta = `${(e.dishes||[]).length} Wochengerichte${e.address?' · '+escapeHtml(e.address):''}`;
  } else {
    meta = `${escapeHtml(e.art||'—')} · ${e.people||'?'} Personen · ${(e.dishes||[]).length} Gerichte · Summe ${fmtEUR(total)}`;
  }
  const showDishButtons = (cat==='event' || cat==='thymeandlime' || cat==='wochenmarkt');
  const showInvoiceButton = (cat==='event' || cat==='thymeandlime');
  return `
  <div class="evt-row" data-id="${e.id}" style="border-left:4px solid ${color};">
    <div class="info">
      <b>${escapeHtml(e.anlass||'Ohne Bezeichnung')}</b> <span class="tag" style="opacity:.6;">${CATEGORY_LABELS[cat]}</span>
      <div class="meta">${meta}</div>
    </div>
    <div class="actions">
      <button type="button" class="btn ghost sm" data-action="edit" data-id="${e.id}">Bearbeiten</button>
      ${showDishButtons ? `<button type="button" class="btn ghost sm" data-action="menu-pdf" data-id="${e.id}">${cat==='wochenmarkt'?'Wochengerichte PDF':'Speisekarte PDF'}</button>` : ''}
      ${showInvoiceButton ? `<button type="button" class="btn gold sm" data-action="angebot" data-id="${e.id}">Angebot</button>` : ''}
      <button type="button" class="btn ghost sm" data-action="gcal" data-id="${e.id}" title="In Google Kalender speichern">📅${e.gcalEventId?' ✓':''}</button>
      <button type="button" class="btn danger sm" data-action="delete" data-id="${e.id}">Löschen</button>
    </div>
  </div>`;
}

function renderDishItem(catKey,item){
  const meta = state.dishMeta[item.id] || {};
  return `
  <div class="dish-item">
    <div class="dname">
      ${meta.photo ? `<img class="thumb" src="${meta.photo}">` : ''}
      <span>${escapeHtml(item.name)}${item.isCustom?' <span class="tag" style="opacity:.5">(neu)</span>':''}</span>
      <button type="button" class="icon-btn" data-meta-edit="${catKey}|${item.id}" title="Foto & Beschreibung">✎</button>
    </div>
    <button type="button" class="add-line-btn" data-add-dish="${catKey}|${item.id}">+ Hinzufügen</button>
  </div>`;

function renderSelectedDishesTable(e){
  const dishes = e.dishes||[];
  const activeCfg = getActiveDishConfig();
  const allowFactor = activeCfg.allowFactor;
  if(dishes.length===0) return `<div class="empty-state">Noch keine Gerichte ausgewählt.</div>`;
  let total = 0;
  const rows = dishes.map((d,idx)=>{
    total += d.unitPrice*d.qty*d.factor;
    const cfg = activeCfg.db[d.category];
    const item = allCategoryItems(d.category).find(i=>i.id===d.itemId) || {name:d.name,isCustom:true};
    const isManual = item.isCustom && cfg.customIndividual;
    let variantCell;
    if(isManual){
      variantCell = `<input type="text" data-line="${idx}" data-field="variantLabel" value="${escapeHtml(d.variant||'')}" placeholder="Variante" style="width:100px">`;
    } else {
      const opts = Object.keys(item.variants||{});
      variantCell = `<select data-line="${idx}" data-field="variant">${opts.map(o=>`<option value="${o}" ${o===d.variant?'selected':''}>${o}</option>`).join('')}</select>`;
    }
    const priceCell = isManual
      ? `<input type="number" step="0.10" data-line="${idx}" data-field="unitPrice" value="${d.unitPrice}" style="width:72px">`
      : `<span>${fmtEUR(d.unitPrice)}</span>`;
    const factorCell = allowFactor
      ? `<select data-line="${idx}" data-field="factor">${FACTORS.map(f=>`<option value="${f}" ${f===d.factor?'selected':''}>${f}</option>`).join('')}</select>`
      : `<span style="opacity:.4;">–</span>`;
    return `<tr>
      <td>${escapeHtml(d.name)}<div class="small-note">${cfg.short}</div></td>
      <td>${variantCell}</td>
      <td>${priceCell}</td>
      <td><input type="number" min="0" step="1" class="qty-input" data-line="${idx}" data-field="qty" value="${d.qty}"></td>
      <td>${factorCell}</td>
      <td><b>${fmtEUR(d.unitPrice*d.qty*d.factor)}</b></td>
      <td><button type="button" class="icon-btn" data-remove-line="${idx}" title="Entfernen">✕</button></td>
    </tr>`;
  }).join('');
  return `
  <table class="dish-table">
    <thead><tr><th>Gericht</th><th>Variante</th><th>Preis/Einheit</th><th>Anzahl</th><th>${allowFactor?'Faktor':''}</th><th>Summe</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="total-row"><td colspan="5">Gesamtsumme (brutto)</td><td colspan="2">${fmtEUR(total)}</td></tr></tfoot>
  </table>`;
}

/* ============================= EVENT HANDLERS ============================= */
function attachGlobalHandlers(){
  const app = document.getElementById('app');

  app.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; render(); });

  const prev = document.getElementById('prevMonth');
  if(prev) prev.onclick = ()=>{ state.viewMonth--; if(state.viewMonth<0){state.viewMonth=11;state.viewYear--;} render(); };
  const next = document.getElementById('nextMonth');
  if(next) next.onclick = ()=>{ state.viewMonth++; if(state.viewMonth>11){state.viewMonth=0;state.viewYear++;} render(); };
  const gotoT = document.getElementById('gotoToday');
  if(gotoT) gotoT.onclick = ()=>{ const t=new Date(); state.viewYear=t.getFullYear(); state.viewMonth=t.getMonth(); state.selectedDate=todayISO(); render(); };

  app.querySelectorAll('.day:not(.empty)').forEach(dEl=>{
    dEl.onclick = ()=>{ state.selectedDate = dEl.dataset.date; render(); };
  });

  const newEventBtn = document.getElementById('newEventBtn');
  if(newEventBtn) newEventBtn.onclick = ()=>{
    state.editingEvent = { id:uid(), date:state.selectedDate, category:'event', anlass:'', contactName:'', email:'', phone:'',
      company:'', people:'', art:ART_OPTIONS[0], address:'', notes:'', dishes:[], nebenkostenOverride:null,
      sonstOrt:'', sonstWie:'', _isNew:true };
    render();
  };

  app.querySelectorAll('[data-action="edit"]').forEach(b=>b.onclick=()=>{
    const evt = state.events.find(e=>e.id===b.dataset.id);
    state.editingEvent = JSON.parse(JSON.stringify(evt));
    if(!state.editingEvent.category) state.editingEvent.category = 'event';
    render();
  });
  app.querySelectorAll('[data-action="delete"]').forEach(b=>b.onclick=()=>{
    if(confirm('Diesen Termin wirklich löschen?')){
      const idToDelete = b.dataset.id;
      state.events = state.events.filter(e=>e.id!==idToDelete);
      deleteEventDoc(idToDelete); render();
    }
  });
  app.querySelectorAll('[data-action="menu-pdf"]').forEach(b=>b.onclick=()=>{
    const evt = state.events.find(e=>e.id===b.dataset.id);
    openMenuPrint(evt);
  });
  app.querySelectorAll('[data-action="angebot"]').forEach(b=>b.onclick=()=>{
    const evt = state.events.find(e=>e.id===b.dataset.id);
    openOfferPrint(evt);
  });
  app.querySelectorAll('[data-action="gcal"]').forEach(b=>b.onclick=()=>{
    const evt = state.events.find(e=>e.id===b.dataset.id);
    syncEventToGoogleCalendar(evt);
  });

  // Modal handlers
  const overlay = document.getElementById('eventOverlay');
  if(overlay){
    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('cancelModal').onclick = closeModal;
    overlay.addEventListener('mousedown',(ev)=>{ if(ev.target===overlay) closeModal(); });

    document.getElementById('f-category').querySelectorAll('.pill').forEach(p=>p.onclick=()=>{
      const newCat = p.dataset.category;
      const oldCat = state.editingEvent.category || 'event';
      const familyOf = c => c==='thymeandlime' ? 'tl' : (c==='sonstiges' ? 'none' : 'standard');
      if(familyOf(newCat) !== familyOf(oldCat)){
        // Gerichte-Katalog wechselt komplett -> alte, nicht mehr passende Auswahl leeren
        state.editingEvent.dishes = [];
      }
      state.editingEvent.category = newCat;
      render();
    });

    const artWrap = document.getElementById('f-art');
    if(artWrap) artWrap.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{
      state.editingEvent.art = p.dataset.art; render();
    });

    const nebenWrap = document.getElementById('f-neben');
    if(nebenWrap) nebenWrap.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{
      const v = p.dataset.neben;
      state.editingEvent.nebenkostenOverride = (v==='null') ? null : parseFloat(v);
      render();
    });

    // Textfelder laufend ins Datenmodell übernehmen (nicht erst beim Speichern),
    // damit nichts verloren geht, wenn zwischendurch ein Gericht hinzugefügt wird.
    const liveFieldMap = {
      'f-anlass':'anlass','f-people':'people','f-contact':'contactName',
      'f-email':'email','f-phone':'phone','f-notes':'notes','f-company':'company',
      'f-sonst-ort':'sonstOrt','f-sonst-wie':'sonstWie'
    };
    Object.keys(liveFieldMap).forEach(fid=>{
      const el = document.getElementById(fid);
      if(el) el.oninput = ()=>{ state.editingEvent[liveFieldMap[fid]] = el.value; };
    });
    const dateEl = document.getElementById('f-date');
    if(dateEl) dateEl.oninput = ()=>{ state.editingEvent.date = dateEl.value; };
    const addrEl = document.getElementById('f-address');
    if(addrEl) addrEl.oninput = ()=>{ state.editingEvent.address = addrEl.value; };
    // Adresse: Maps-Link erst bei "change" (nicht bei jedem Tastenanschlag) neu anzeigen
    if(addrEl) addrEl.onblur = ()=>{ state.editingEvent.address = addrEl.value; render(); };

    const delBtn = document.getElementById('deleteEventBtn');
    if(delBtn) delBtn.onclick = ()=>{
      if(confirm('Diesen Termin wirklich löschen?')){
        const idToDelete = state.editingEvent.id;
        state.events = state.events.filter(e=>e.id!==idToDelete);
        deleteEventDoc(idToDelete); state.editingEvent=null; render();
      }
    };

    document.getElementById('saveEventBtn').onclick = ()=>{
      const e = state.editingEvent;
      const val = (id)=>{ const el=document.getElementById(id); return el ? el.value : undefined; };
      if(val('f-anlass')!==undefined) e.anlass = val('f-anlass').trim();
      if(val('f-date')) e.date = val('f-date');
      if(val('f-people')!==undefined) e.people = val('f-people');
      if(val('f-contact')!==undefined) e.contactName = val('f-contact').trim();
      if(val('f-email')!==undefined) e.email = val('f-email').trim();
      if(val('f-phone')!==undefined) e.phone = val('f-phone').trim();
      if(val('f-address')!==undefined) e.address = val('f-address').trim();
      if(val('f-notes')!==undefined) e.notes = val('f-notes');
      if(val('f-company')!==undefined) e.company = val('f-company').trim();
      if(val('f-sonst-ort')!==undefined) e.sonstOrt = val('f-sonst-ort').trim();
      if(val('f-sonst-wie')!==undefined) e.sonstWie = val('f-sonst-wie').trim();
      delete e._isNew;
      const idx = state.events.findIndex(x=>x.id===e.id);
      if(idx>=0) state.events[idx]=e; else state.events.push(e);
      saveEventDoc(e);
      state.selectedDate = e.date;
      state.editingEvent = null;
      render();
    };

    // Gerichte-Bereich: eigene, gezielte Aktualisierung (siehe attachDishHandlers/refreshDishSection),
    // damit die Formularfelder oben (Anlass, Kontakt, ...) beim Klicken NIE neu gezeichnet werden.
    attachDishHandlers();
  }

  // Settings tab
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = ()=>{ signOut(auth); };

  const logoInput = document.getElementById('logoUpload');
  if(logoInput) logoInput.onchange = async (ev)=>{
    const file = ev.target.files[0];
    if(!file) return;
    state.settings.logo = await compressImageFile(file, 300, 0.8);
    saveSettingsDoc(); render();
  };
  const rmLogo = document.getElementById('removeLogoBtn');
  if(rmLogo) rmLogo.onclick = ()=>{ state.settings.logo=null; saveSettingsDoc(); render(); };

  const connectGcalBtn = document.getElementById('connectGcalBtn');
  if(connectGcalBtn) connectGcalBtn.onclick = connectGoogleCalendar;

  const expBtn = document.getElementById('exportBackupBtn');
  if(expBtn) expBtn.onclick = exportBackup;
  const impInput = document.getElementById('importBackupInput');
  if(impInput) impInput.onchange = (ev)=>{ const f=ev.target.files[0]; if(f) importBackup(f); };
}

function refreshDishSection(){
  const accWrap = document.getElementById('dishAccordionWrap');
  const selWrap = document.getElementById('selectedDishesWrap');
  if(!accWrap || !selWrap || !state.editingEvent) return;
  try{
    // Scroll-Position des Modal-Overlays merken
    const overlayEl = document.getElementById('eventOverlay');
    const overlayScroll = overlayEl ? overlayEl.scrollTop : 0;
    accWrap.innerHTML = getActiveDishConfig().catOrder.map(catKey=>renderCatBlock(catKey)).join('');
    selWrap.innerHTML = renderSelectedDishesTable(state.editingEvent);
    attachDishHandlers();
    if(overlayEl) overlayEl.scrollTop = overlayScroll;
  }catch(err){
    console.error('Fehler im Gerichte-Bereich:', err);
    accWrap.insertAdjacentHTML('afterbegin', `<div style="background:#4a1520;border:1px solid #b02942;color:#f2c9d1;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:8px;">Es gab ein internes Problem beim Aktualisieren (${escapeHtml(err.message||String(err))}). Deine bisherigen Angaben sind nicht verloren — bitte Termin trotzdem einmal über "Speichern" sichern.</div>`);
  }
}

function attachDishHandlers(){
  const accWrap = document.getElementById('dishAccordionWrap');
  const selWrap = document.getElementById('selectedDishesWrap');
  if(!accWrap || !selWrap) return;

  accWrap.querySelectorAll('[data-toggle-cat]').forEach(el=>el.onclick=()=>{
    try{
      const k = el.dataset.toggleCat; state.openCats[k]=!state.openCats[k]; refreshDishSection();
    }catch(err){ console.error('Toggle-Kategorie-Fehler:', err); }
  });

  accWrap.querySelectorAll('[data-add-dish]').forEach(el=>el.onclick=()=>{
    try{
      const [catKey,itemId] = el.dataset.addDish.split('|');
      const item = allCategoryItems(catKey).find(i=>i.id===itemId);
      if(!item) throw new Error('Gericht nicht gefunden: '+itemId);
      const cfg = getActiveDishConfig().db[catKey];
      const manual = item.isCustom && cfg.customIndividual;
      const firstVariant = item.variants ? Object.keys(item.variants)[0] : null;
      state.editingEvent.dishes.push({
        lineId: uid(), category:catKey, itemId:item.id, name:item.name,
        variant: manual ? '' : firstVariant,
        unitPrice: manual ? 0 : (item.variants[firstVariant]||0),
        qty:1, factor:1
      });
      refreshDishSection();
    }catch(err){ console.error('Gericht-hinzufügen-Fehler:', err); }
  });

  accWrap.querySelectorAll('[data-newdish-btn]').forEach(el=>el.onclick=()=>{
    try{
      const catKey = el.dataset.newdishBtn;
      const input = accWrap.querySelector(`[data-newdish-input="${catKey}"]`);
      const name = input.value.trim();
      if(!name) return;
      const id = catKey+'-custom-'+uid();
      const cfg = getActiveDishConfig();
      const store = state[cfg.custom];
      store[catKey] = store[catKey]||[];
      store[catKey].push({id,name});
      if(cfg.custom==='customDishesTL') saveCustomDishCategoryTL(catKey); else saveCustomDishCategory(catKey);
      state.openCats[catKey]=true;
      refreshDishSection();
    }catch(err){ console.error('Neues-Gericht-Fehler:', err); }
  });

  accWrap.querySelectorAll('[data-meta-edit]').forEach(el=>el.onclick=()=>{
    const [catKey,itemId] = el.dataset.metaEdit.split('|');
    openDishMetaEditor(catKey,itemId);
  });

  selWrap.querySelectorAll('[data-line]').forEach(el=>{
    el.onchange = ()=>{
      const idx = parseInt(el.dataset.line);
      const field = el.dataset.field;
      const d = state.editingEvent.dishes[idx];
      if(field==='variant'){
        d.variant = el.value;
        const item = allCategoryItems(d.category).find(i=>i.id===d.itemId);
        if(item && item.variants && item.variants[el.value]!==undefined) d.unitPrice = item.variants[el.value];
      } else if(field==='variantLabel'){
        d.variant = el.value;
      } else if(field==='unitPrice'){
        d.unitPrice = parseFloat(el.value)||0;
      } else if(field==='qty'){
        d.qty = parseFloat(el.value)||0;
      } else if(field==='factor'){
        d.factor = parseFloat(el.value)||1;
      }
      refreshDishSection();
    };
  });

  selWrap.querySelectorAll('[data-remove-line]').forEach(el=>el.onclick=()=>{
    const idx = parseInt(el.dataset.removeLine);
    state.editingEvent.dishes.splice(idx,1);
    refreshDishSection();
  });
}

function computeNebenkosten(art,people,overrideVal){
  if(overrideVal!==null && overrideVal!==undefined && overrideVal!=='null'){
    return parseFloat(overrideVal)||0;
  }
  const rule = NEBENKOSTEN[art];
  if(!rule) return 0;
  if(rule.type==='flat') return rule.value;
  if(rule.type==='perPerson') return rule.value*(parseFloat(people)||0);
  return 0;
}

function dishesByInvoiceGroup(evt){
  const cat = evt.category || 'event';
  if(cat==='thymeandlime'){
    const groups = {Vorspeisen:[], Hauptspeisen:[], Desserts:[], 'Snacks/Streetfood':[]};
    const keyMap = {vorspeisen:'Vorspeisen', hauptspeisen:'Hauptspeisen', desserts:'Desserts', snacks:'Snacks/Streetfood'};
    (evt.dishes||[]).forEach(d=>{
      const label = d.name + (d.variant?' ('+d.variant+')':'');
      const col = keyMap[d.category] || 'Hauptspeisen';
      groups[col].push(label);
    });
    return groups;
  }
  const groups = {Vorspeisen:[], Hauptgerichte:[], Desserts:[]};
  (evt.dishes||[]).forEach(d=>{
    const label = d.name + (d.variant?' ('+d.variant+')':'');
    if(d.category==='vorspeisen') groups.Vorspeisen.push(label);
    else if(d.category==='desserts') groups.Desserts.push(label);
    else groups.Hauptgerichte.push(label);
  });
  return groups;
}

        <span><b id="invNoLabel">Rechnung:</b> <span contenteditable="true" id="invNo">00001</span></span>
        <span><b>Datum:</b> <span contenteditable="true">${new Date().toLocaleDateString('de-DE')}</span></span>
        <span><b>Leistungsdatum:</b> <span contenteditable="true">${new Date(evt.date).toLocaleDateString('de-DE')}</span></span>
      </div>

      <p style="font-size:10.5px;color:#7a746a;margin:0 0 6px;">Preis pro Person, Anzahl und Nebenkosten direkt antippen und überschreiben — z. B. für einen einfachen Pauschalpreis statt der aus den Gerichten berechneten Summe. Alle Summen darunter rechnen sich automatisch neu.</p>
      <table class="inv-table">
        <thead><tr><th>#</th><th>Beschreibung</th><th>Einzelpreis Netto</th><th>Anzahl</th><th>Einzelpreis Brutto</th><th>MwSt.-Satz</th></tr></thead>
        <tbody>
          <tr>
            <td>1</td>
            <td contenteditable="true">${escapeHtml(artLabel)}</td>
            <td style="text-align:right;" id="foodUnitNetto" contenteditable="true">${fmtEUR(foodUnitNetto)}</td>
            <td style="text-align:center;" id="foodQty" contenteditable="true">${people}</td>
            <td style="text-align:right;" id="foodUnitBrutto" contenteditable="true">${fmtEUR(foodUnitBrutto)}</td>
            <td style="text-align:center;">7 %</td>
          </tr>
          <tr>
            <td>2</td>
            <td contenteditable="true">Catering-Nebenkosten-Pauschale</td>
            <td style="text-align:right;" id="nebenNetto" contenteditable="true">${fmtEUR(nebenNetto)}</td>
            <td style="text-align:center;">1</td>
            <td style="text-align:right;" id="nebenBrutto" contenteditable="true">${fmtEUR(nebenkosten)}</td>
            <td style="text-align:center;">19 %</td>
          </tr>
        </tbody>
      </table>

      <table class="inv-summary">
        <tbody>
          <tr><td>Nettopreis gesamt (Position 1)</td><td style="text-align:right;" id="posNetto1">${fmtEUR(foodNetto)}</td></tr>
          <tr><td>Nettopreis gesamt (Position 2)</td><td style="text-align:right;" id="posNetto2">${fmtEUR(nebenNetto)}</td></tr>
          <tr class="inv-total-row"><td><b>Nettopreis gesamt</b></td><td style="text-align:right;" id="sumNetto"><b>${fmtEUR(nettoGesamt)}</b></td></tr>
          <tr><td>MwSt. Catering 7%</td><td style="text-align:right;" id="sumMwstFood">${fmtEUR(mwstFood)}</td></tr>
          <tr><td>MwSt. Nebenkosten 19%</td><td style="text-align:right;" id="sumMwstNeben">${fmtEUR(mwstNeben)}</td></tr>
          <tr class="inv-total-row"><td><b>Gesamtbetrag inkl. Nebenkosten</b></td><td style="text-align:right;" id="sumBrutto"><b>${fmtEUR(bruttoGesamt)}</b></td></tr>
        </tbody>
      </table>

      <table class="inv-dishes">
        <thead><tr>${groupNames.map(g=>`<th>${escapeHtml(g)}</th>`).join('')}</tr></thead>
        <tbody>${dishRows}</tbody>
      </table>

      <div class="inv-footer" contenteditable="true">
        <div><b>Rechtsform:</b> ${COMPANY.rechtsform}<br><b>Geschäftsführer:</b> ${COMPANY.geschaeftsfuehrer}<br><b>Kontoinhaber:</b> ${COMPANY.kontoinhaber}</div>
        <div><b>Steuernummer:</b> ${COMPANY.steuernummer}</div>
        <div>${COMPANY.bank}</div>
      </div>
    </div>`;
  const pa = document.getElementById('printArea');
  pa.innerHTML = html;
  pa.classList.add('show');

  pa.querySelectorAll('.doc-type-btn').forEach(btn=>btn.onclick=()=>{
    pa.querySelectorAll('.doc-type-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const type = btn.dataset.doctype;
    document.getElementById('invTitle').textContent = type+' Catering';
    document.getElementById('invNoLabel').textContent = (type==='Rechnung'?'Rechnung:':'Angebot:');
  });

  // Live-Neuberechnung: Preise direkt in der Tabelle antippen und ändern
  // (z. B. einfach einen Pauschalpreis pro Person eintragen) — alle Summen
  // darunter aktualisieren sich automatisch.
  function parseGermanNumber(str){
    return parseFloat(String(str).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.'))||0;
  }
  function recalcInvoice(){
    const foodBrutto = parseGermanNumber(document.getElementById('foodUnitBrutto').textContent);
    const foodQtyVal = parseGermanNumber(document.getElementById('foodQty').textContent) || 1;
    const nebenBruttoVal = parseGermanNumber(document.getElementById('nebenBrutto').textContent);

    const posFoodBruttoTotal = foodBrutto * foodQtyVal;
    const posFoodNetto = posFoodBruttoTotal / 1.07;
    const posNebenNetto = nebenBruttoVal / 1.19;
    const gesamtNetto = posFoodNetto + posNebenNetto;
    const mwstFoodVal = posFoodNetto * 0.07;
    const mwstNebenVal = posNebenNetto * 0.19;
    const gesamtBrutto = posFoodBruttoTotal + nebenBruttoVal;

    document.getElementById('foodUnitNetto').textContent = fmtEUR(foodBrutto/1.07);
    document.getElementById('nebenNetto').textContent = fmtEUR(posNebenNetto);
    document.getElementById('posNetto1').textContent = fmtEUR(posFoodNetto);
    document.getElementById('posNetto2').textContent = fmtEUR(posNebenNetto);
    document.getElementById('sumNetto').innerHTML = '<b>'+fmtEUR(gesamtNetto)+'</b>';
    document.getElementById('sumMwstFood').textContent = fmtEUR(mwstFoodVal);
    document.getElementById('sumMwstNeben').textContent = fmtEUR(mwstNebenVal);
    document.getElementById('sumBrutto').innerHTML = '<b>'+fmtEUR(gesamtBrutto)+'</b>';
  }
  ['foodUnitBrutto','foodQty','nebenBrutto'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('input', recalcInvoice);
  });
}

/* ============================= INIT ============================= */
onAuthStateChanged(auth, (user)=>{
  if(user){
    state.authUser = user;
    state.authError = null;
    state.authBusy = false;
    if(!state.loaded){ startFirestoreSync(); }
  } else {
    state.authUser = null;
    state.loaded = false;
    stopFirestoreSync();
  }
  render();
});
render(); // zeigt sofort die Login-Maske, während Firebase im Hintergrund den Login-Status prüft

// Macht die Seite als "richtige App" installierbar (Homescreen-Icon, Vollbild).
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

</script>
</body>
